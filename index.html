<script>
// ══════════════════════════════════════════════════
//  CONFIG  — update these when your backend is ready
// ═══════════════════════════════════════════════════
const CTI_CONFIG = {
  USE_MOCK_DATA:  true,                          // set false when backend is live
  API_BASE_URL:   'https://api.cepheusspace.com', // your Railway / Render URL
  REFRESH_MS:     15 * 60 * 1000,               // 15 minutes
};

// ═══════════════════════════════════════════════════
//  MOCK DATA  (mirrors real API response shapes)
// ═══════════════════════════════════════════════════
const MOCK = {
  summary: {
    active_pulses: 127, critical_cves: 8,
    exposed_assets: 342, new_threats_today: 23,
  },
  otx: { pulses: [
    { id:1, name:'APT29 Cozy Bear Infrastructure',         severity:'critical', iocs:47,  created:'2026-03-14', tags:['APT29','Russia','C2'] },

    { id:4, name:'Supply Chain Compromise – Firmware',     severity:'high',     iocs:89,  created:'2026-03-11', tags:['Supply Chain','Firmware'] },
    { id:5, name:'DDoS Botnet Targeting EU Infrastructure',severity:'medium',   iocs:312, created:'2026-03-10', tags:['DDoS','EU'] },
  ]},
  cves: { cves: [
    { id:'CVE-2026-1337', cvss:9.8, description:'Remote code execution in satellite telemetry software',    vendor:'AeroSoft',   date:'2026-03-14' },
    { id:'CVE-2026-1289', cvss:7.5, description:'Authentication bypass in ground station management API',   vendor:'SpaceCtrl',  date:'2026-03-13' },
    { id:'CVE-2026-0991', cvss:8.1, description:'SQL injection in space mission planning web portal',       vendor:'OrbitalDB',  date:'2026-03-11' },
    { id:'CVE-2026-0872', cvss:6.5, description:'Privilege escalation in Linux-based telemetry systems',   vendor:'Various',    date:'2026-03-10' },
  ]},
  shodan: { assets: [
    { ip:'185.23.xx.xx', port:22,  org:'AeroGround GmbH',  country:'DE', product:'OpenSSH 7.4',          risk:'high' },
    { ip:'91.108.xx.xx', port:502, org:'SpaceTech AS',     country:'NO', product:'Modbus (ICS)',          risk:'critical' },
    { ip:'45.89.xx.xx',  port:80,  org:'SatLink Ltd',      country:'GB', product:'Apache 2.2.34 (EOL)',   risk:'medium' },
    { ip:'194.33.xx.xx', port:23,  org:'Orbital Systems',  country:'SE', product:'Telnet (unencrypted)',  risk:'critical' },
  ]},
  misp: { events: [
    { uuid:'MISP-2026-0341', info:'APT Ground Track Campaign',    date:'2026-03-14', threat_level:'High',   attribute_count:47, tag_names:['tlp:amber','apt:apt29'] },
    { uuid:'MISP-2026-0339', info:'Space Phishing Infrastructure', date:'2026-03-13', threat_level:'High',   attribute_count:23, tag_names:['tlp:white','phishing'] },
    { uuid:'MISP-2026-0327', info:'Satellite Malware Dropper',     date:'2026-03-11', threat_level:'Medium', attribute_count:12, tag_names:['tlp:green','malware'] },
    { uuid:'MISP-2026-0310', info:'ICS Recon Activity',            date:'2026-03-09', threat_level:'Medium', attribute_count:8,  tag_names:['tlp:white','ics','scada'] },
  ]},
};

// ═══════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════
const SEV_COLOR = { critical:'#ff3b3b', high:'#ff8c00', medium:'#ffd700', low:'#4caf50' };

function cvssColor(s) {
  return s >= 9 ? '#ff3b3b' : s >= 7 ? '#ff8c00' : s >= 4 ? '#ffd700' : '#4caf50';
}

function badge(label, color) {
  return `<span class="cti-badge" style="background:${color}22;color:${color}">${label}</span>`;
}

function tag(t) {
  return `<span class="cti-tag">${t}</span>`;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════
//  DATA FETCHING
// ═══════════════════════════════════════════════════
async function fetchData(endpoint) {
  if (CTI_CONFIG.USE_MOCK_DATA) {
    await new Promise(r => setTimeout(r, 300)); // simulate network delay
    return MOCK[endpoint] || {};
  }
  const res = await fetch(`${CTI_CONFIG.API_BASE_URL}/api/${endpoint}`);
  if (!res.ok) throw new Error(`API error: ${res.status}`);
  return res.json();
}

// ═══════════════════════════════════════════════════
//  RENDER PANELS
// ═══════════════════════════════════════════════════
function renderOTX(data) {
  const rows = (data.pulses || []).map(p => `
    <div class="cti-row">
      <div class="cti-row-main">
        <div class="cti-row-title">${escHtml(p.name)}</div>
        <div class="cti-tags">${(Z.tags||[]).map(tag).join('')}</div>
      </div>
      <div class="cti-ioc">
        <div class="cti-ioc-val">${p.iocs}</div>
        <div class="cti-ioc-lbl">IOCs</div>
      </div>
      <div class="cti-row-meta">${p.created}</div>
      ${badge(p.severity, SEV_COLOR[p.severity] || '#888')}
    </div>`).join('');

  return `
    <div class="cti-panel-header">
      <span class="cti-panel-title">📡 AlienVault OTX — Active Threat Pulses</span>
      <span class="cti-panel-badge">Live · Space &amp; Aerospace</span>
    </div>
    ${rows || '<div class="cti-loader">No pulses found.</div>'}`;
}

function renderCVEs(data) {
  const rows = (data.cves || []).map(c => `
    <div class="cti-row">
      <div class="cti-row-main">
        <div class="cti-row-title mono" style="color:#7eb8ff">${escHtml(c.id)}</div>
        <div class="cti-row-sub">${escHtml(c.description)}</div>
        <div class="cti-row-meta">Vendor: ${escHtml(c.vendor)} · ${c.date}</div>
      </div>
      <div class="cti-cvss">
        <div class="cti-cvss-val" style="color:${cvssColor(c.cvss)}">${c.cvss}</div>
        <div class="cti-cvss-lbl">CVSS v3</div>
      </div>
    </div>`).join('');

  return `
    <div class="cti-panel-header">
      <span class="cti-panel-title">🛡️ NVD / CVE Feed — Space &amp; Aerospace Vulnerabilities</span>
      <span class="cti-panel-badge">Filtered · CVSS ≥ 6.0</span>
    </div>
    ${rows || '<div class="cti-loader">No CVEs found.</div>'}`;
}

function renderShodan(data) {
  const rows = (data.assets || []).map(a => `
    <div class="cti-row">
      <div class="cti-row-main">
        <div class="cti-row-title mono" style="color:#7eb8ff">${escHtml(a.ip)}:${a.port}</div>
        <div class="cti-row-sub">${escHtml(a.product)} · ${escHtml(a.org)}</div>
        <div class="cti-row-meta">Country: ${escHtml(a.country)}</div>
      </div>
      ${badge(a.risk, SEV_COLOR[a.risk] || '#888')}
    </div>`).join('');

  return `
    <div class="cti-panel-header">
      <span class="cti-panel-title">🌐 Shodan — Exposed Space Industry Assets</span>
      <span class="cti-panel-badge">Org filter · Aerospace &amp; Satellite</span>
    </div>
    ${rows || '<div class="cti-loader">No assets found.</div>'}`;
}

function renderMISP(data) {
  const rows = (data.events || []).map(e => `
    <div class="cti-row">
      <div class="cti-row-main">
        <div class="cti-row-title mono" style="color:#7eb8ff">${escHtml(e.uuid)}</div>
        <div class="cti-row-sub">${escHtml(e.info)}</div>
        <div class="cti-tags">${(e.tag_names||[]).map(tag).join('')}</div>
        <div class="cti-row-meta" style="margin-top:4px">${e.date} · ${e.attribute_count} attributes</div>
      </div>
      ${badge(e.threat_level, e.threat_level==='High' ? '#4caf50' : '#ffd700')}
    </div>`).join('');

  return `
    <div class="cti-panel-header">
      <span class="cti-panel-title">🔗 MISP — Shared Threat Indicators</span>
      <span class="cti-panel-badge">Community feed · Filtered</span>
    </div>
    ${rows || '<div class="cti-loader">No MISP events found.</div>'}`;
}

const RENDERERS = { otx: renderOTX, cves: renderCVEs, shodan: renderShodan, misp: renderMISP };
const ENDPOINTS = { otx: 'otx',    cves: 'cves',    shodan: 'shodan',    misp: 'misp' };

// ═══════════════════════════════════════════════════
//  TAB SWITCHING
// ═══════════════════════════════════════════════════
let currentTab = 'otx';

async function ctiShowTab(tab, btnEl) {
  currentTab = tab;

  // Update tab active state
  document.querySelectorAll('#cti-root .cti-tab').forEach(b => b.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');

  const panel = document.getElementById('cti-panel');
  panel.innerHTML = '<div class="cti-loader">Loading…</div>';

  try {
    const data = await fetchData(ENDPOINTS[tab]);
    panel.innerHTML = RENDERERS[tab](data);
  } catch (err) {
    panel.innerHTML = `<div class="cti-loader" style="color:#ff3b3b">
      ⚠️ Failed to load data: ${escHtml(err.message)}
    </div>`;
  }
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
async function ctiInit() {
  // Load summary stats
  try {
    const s = await fetchData('summary');
    document.getElementById('stat-pulses').textContent = s.active_pulses  ?? '—';
    document.getElementById('stat-cves').textContent   = s.critical_cves  ?? '—';
    document.getElementById('stat-assets').textContent = s.exposed_assets ?? '—';
    document.getElementById('stat-new').textContent    = s.new_threats_today ?? '—';
  } catch(_) {}

  // Load initial tab
  ctiShowTab('otx', document.querySelector('#cti-root .cti-tab'));

  // Show last-refreshed time
  const label = document.getElementById('cti-refresh-label');
  label.textContent = 'Last updated: ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + ' · Auto-refreshes every 15 min';

  // Auto-refresh
  setInterval(() => {
    ctiShowTab(currentTab, null);
    label.textContent = 'Last updated: ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + ' · Auto-refreshes every 15 min';
  }, CTI_CONFIG.REFRESH_MS);
}

// Run after DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', ctiInit);
} else {
  ctiInit();
}
</script>
