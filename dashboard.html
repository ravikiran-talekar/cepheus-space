<script>

// ═══════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════
async function fetchData(endpoint) {
  if (CTI_CONFIG.USE_MOCK_DATA) {
    return new Promise(resolve => setTimeout(() => resolve(MOCK_DATA[endpoint]), 500));
  }
  const response = await fetch(`${CTI_CONFIG.API_BASE_URL}/${endpoint}`);
  return response.json();
}

function formatTimeAgo(date) {
  const now = new Date();
  const diff = now - new Date(date);
  const hours = Math.floor(diff / 3600000);
  return `${hours} hours ago`;
}

function getCVSSColor(score) {
  if (score >= 9) return '#dc2626';
  if (score >= 7) return '#ea580c';
  if (score >= 4) return '#ca8a04';
  return '#16a34a';
}

function getAssetStatusColor(status) {
  switch (status) {
    case 'exposed': return '#dc2626';
    case 'vulnerable': return '#ea580c';
    case 'warning': return '#ca8a04';
    case 'secure': return '#16a34a';
    default: return '#6b7280';
  }
}

// ═══════════════════════════════════════════════════
//  RENDERERS
// ═══════════════════════════════════════════════════

          <div class="cti-row-sub">${item.sub}</div>
          <div class="cti-row-meta">${item.meta}</div>
          <div class="cti-tags">${item.tags.map(tag => `<span class="cti-tag">${tag}</span>`).join('')}</div>
        </div>
        <div class="cti-ioc">

          <div class="cti-ioc-lbl">IOCs</div>
        </div>
        <div class="cti-cvss">
          <div class="cti-cvss-val" style="color: ${getCVSSColor(item.cvss)}">${item.cvss}</div>
          <div class="cti-cvss-lbl">CVSS</div>
        </div>
      </div>

}

// ═══════════════════════════════════════════════════
//  MAIN
// ═══════════════════════════════════════════════════
let currentTab = 'otx';

function ctiShowTab(tab, button = null) {
  // Update active tab
  document.querySelectorAll('.cti-tab').forEach(btn => btn.classList.remove('active'));
  if (button) button.classList.add('active');
  else document.querySelector(`[onclick="ctiShowTab('${tab}')"]`).classList.add('active');

  // Hide all panels
  document.querySelectorAll('.cti-panel').forEach(panel => panel.style.display = 'none');

  // Show selected panel
  document.getElementById(`cti-${tab}-panel`).style.display = 'block';

  // Load data
  currentTab = tab;
  fetchData(tab).then(data => {
    if (tab === 'otx') renderOTXPanel(data);
    else if (tab === 'cve') renderCVEPanel(data);
    else if (tab === 'ioc') renderIOCPanel(data);
    else if (tab === 'assets') renderAssetsPanel(data);
  }).catch(() => {
    document.getElementById(`cti-${tab}-panel`).innerHTML = '<div class="cti-loader">Failed to load data</div>';
  });
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
async function ctiInit() {
  // Load summary stats
  try {
    const s = await fetchData('summary');
    document.getElementById('stat-pulses').textContent = s.active_pulses  ?? '—';
    document.getElementById('stat-cves').textContent   = s.critical_cves  ?? '—';
    document.getElementById('stat-assets').textContent = s.exposed_assets ?? '—';
    document.getElementById('stat-new').textContent    = s.new_threats_today ?? '—';
  } catch(_) {}

  // Load initial tab
  ctiShowTab('otx', document.querySelector('#cti-root .cti-tab'));

  // Show last-refreshed time
  const label = document.getElementById('cti-refresh-label');
  label.textContent = 'Last updated: ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + ' · Auto-refreshes every 15 min';

  // Auto-refresh
  setInterval(() => {
    ctiShowTab(currentTab, null);
    label.textContent = 'Last updated: ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + ' · Auto-refreshes every 15 min';
  }, CTI_CONFIG.REFRESH_MS);
}

// Run after DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', ctiInit);
} else {
  ctiInit();
}
</script>
